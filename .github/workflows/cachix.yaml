name: Validate flake and upload builds to Cachix

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

env:
  CACHIX_BINARY_CACHE: dotnix

jobs:
  quality:
    name: Formatting and static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31

      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@v13

      - name: Check formatting
        run: git ls-files -z '*.nix' | xargs -0 nix fmt -- --check

      # These expose the existing lint baseline without blocking configuration
      # validation. New warnings should still be fixed when touching a file.
      - name: Run statix
        continue-on-error: true
        run: nix develop --no-write-lock-file -c statix check .

      - name: Run deadnix
        continue-on-error: true
        run: nix develop --no-write-lock-file -c deadnix .

      - name: Check flake outputs
        run: nix flake check --no-build --no-write-lock-file --print-build-logs

      - name: Verify the committed lock file is unchanged
        run: git diff --exit-code -- flake.lock

  evaluate:
    name: Evaluate ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all NixOS configurations
            target: .#nixosConfigurations
            apply: 'configs: builtins.mapAttrs (_: config: config.config.system.build.toplevel.drvPath) configs'
          - name: all Darwin configurations
            target: .#darwinConfigurations
            apply: 'configs: builtins.mapAttrs (_: config: config.config.system.build.toplevel.drvPath) configs'
          - name: all Home Manager configurations
            target: .#homeConfigurations
            apply: 'configs: builtins.mapAttrs (_: config: config.activationPackage.drvPath) configs'
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31

      - name: Evaluate derivation
        run: nix eval --json --no-write-lock-file '${{ matrix.target }}' --apply '${{ matrix.apply }}'

      - name: Verify the committed lock file is unchanged
        run: git diff --exit-code -- flake.lock

  # These representative outputs cover Linux desktop/server configurations and
  # the active Apple Silicon host without building every large closure per PR.
  build:
    name: Build ${{ matrix.name }}
    needs: [quality, evaluate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NixOS nz
            os: ubuntu-latest
            target: .#nixosConfigurations.nz.config.system.build.toplevel
          - name: NixOS zanoza
            os: ubuntu-latest
            target: .#nixosConfigurations.zanoza.config.system.build.toplevel
          - name: Darwin mba13
            os: macos-15
            target: .#darwinConfigurations.mba13.config.system.build.toplevel
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/share/glade* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell"
          testing: false

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: ${{ env.CACHIX_BINARY_CACHE }}

      - name: Build committed output
        run: nix build --no-link --no-write-lock-file --print-build-logs '${{ matrix.target }}'

      - name: Verify the committed lock file is unchanged
        run: git diff --exit-code -- flake.lock
